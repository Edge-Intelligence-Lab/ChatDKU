name: Lint

on:
  pull_request:
  workflow_dispatch:

jobs:
  changed-files:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.changed.outputs.files }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git diff against base

      - name: Get changed Python files
        id: changed
        run: |
          files="$(git diff --diff-filter=ACMRT --name-only origin/${{ github.base_ref }}...${{ github.sha }} -- '*.py' | tr '\n' ' ')"
          echo "files=$files"
          echo "files=$files" >> "$GITHUB_OUTPUT"

  black:
    runs-on: ubuntu-latest
    needs: changed-files

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Black
        run: pip install black==24.2.0

      - name: Run Black (check) on changed files
        if: needs.changed-files.outputs.files != ''
        run: |
          black --check ${{ needs.changed-files.outputs.files }}

  flake8:
    runs-on: ubuntu-latest
    needs: changed-files

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Flake8
        run: pip install flake8

      - name: Run Flake8 on changed files
        if: needs.changed-files.outputs.files != ''
        run: |
          flake8 --ignore=E203,W503 --max-line-length 120 ${{ needs.changed-files.outputs.files }}
