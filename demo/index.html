<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        #chat-container {
            width: 90%;
            max-width: 800px;
            height: 80%;
            display: flex;
            flex-direction: column;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        #chat-log {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            border-bottom: 1px solid #eee;
        }
        .message {
            margin: 10px 0;
            display: flex;
            align-items: flex-start;
        }
        .user-message {
            justify-content: flex-end;
        }
        .user-message span, .bot-message span {
            max-width: 70%;
            padding: 12px;
            border-radius: 12px;
            display: inline-block;
            word-wrap: break-word;
            box-sizing: border-box;
            font-size: 16px;
        }
        .user-message span {
            background-color: #007bff;
            color: #fff;
        }
        .bot-message span {
            background-color: #f1f0f0;
            color: #333;
        }
        #input-container {
            display: flex;
            padding: 10px;
            border-top: 1px solid #eee;
        }
        #message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        #send-button {
            margin-left: 10px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
        #send-button:hover {
            background-color: #0056b3;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="chat-container">
        <div id="chat-log"></div>
        <div id="input-container">
            <input type="text" id="message-input" placeholder="Type a message..." />
            <button id="send-button">Send</button>
        </div>
    </div>

    <script>
        const chatHistory = [];

        document.getElementById('send-button').addEventListener('click', sendMessage);
        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (message === '') return;

            addMessage('user-message', message);
            chatHistory.push({ role: 'user', content: message });
            input.value = '';

            // FIXME: Don't use hard-coded URL
            fetch('http://10.201.8.54:5000/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ messages: chatHistory })
            })
            .then(response => {
                if (response.headers.get('content-type')?.includes('application/json')) {
                    // If the response is JSON, handle it as an error
                    return response.json().then(data => {
                        if (data.error) {
                            addMessage('bot-message', 'Error: ' + data.error);
                        }
                    });

                } else {
                    // If the response is not JSON, handle it as a stream
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let receivedText = '';

                    // Create a new message element for the streaming text
                    const chatLog = document.getElementById('chat-log');
                    const messageElement = document.createElement('div');
                    messageElement.className = 'message bot-message';
                    const messageContent = document.createElement('span');
                    messageElement.appendChild(messageContent);
                    chatLog.appendChild(messageElement);
                    chatLog.scrollTop = chatLog.scrollHeight;

                    function readStream() {
                        reader.read().then(({ done, value }) => {
                            if (done) {
                                // End of stream
                                if (receivedText) {
                                    chatHistory.push({ role: 'assistant', content: receivedText });
                                }
                                return;
                            }
                            // Process the chunk of text
                            const chunk = decoder.decode(value, { stream: true });
                            receivedText += chunk;
                            messageContent.innerHTML = marked.parse(receivedText);
                            chatLog.scrollTop = chatLog.scrollHeight;
                            // Continue reading
                            readStream();
                        }).catch(error => {
                            addMessage('bot-message', 'Error: ' + error.message);
                        });
                    }

                    // Start reading the stream
                    readStream();
                }
            })
            .catch(error => {
                addMessage('bot-message', 'Error: ' + error.message);
            });
        }

        function addMessage(className, message) {
            const chatLog = document.getElementById('chat-log');
            const messageElement = document.createElement('div');
            messageElement.className = 'message ' + className;
            messageElement.innerHTML = `<span>${message}</span>`;
            chatLog.appendChild(messageElement);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function addMarkdownMessage(className, markdown) {
            const chatLog = document.getElementById('chat-log');
            const messageElement = document.createElement('div');
            messageElement.className = 'message ' + className;
            messageElement.innerHTML = `<span>${marked.parse(markdown)}</span>`;
            chatLog.appendChild(messageElement);
            chatLog.scrollTop = chatLog.scrollHeight;
        }
    </script>
</body>
</html>
