<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="head">
        <span id="head_title">Chat-DKU</span>
        <img src="res/edge_logo.svg" alt="edge_lab_logo"></img>
    </div>
    <div id="chat-container">
        <div id="chat-log">
            <div id="page-center-logo-div"> <img src="res/edge_logo.svg" width="80px" alt="edge_lab_logo"></img></div>
            <div id="usecase-div">
                <div class="block" id="academic" data-content="Do we have courses to learn other foreign languages? How to take it?">
                    <div class="logo">
                        <img src="res/academic_logo.png" alt="Logo 1" style="max-width: 90%; max-height: 90%;">
                    </div>
                    <div class="text">Academic</div>
                </div>
                <div class="block" id="campus" data-content="Is it better to have one mentor or two for my signature work?">
                    <div class="logo">
                        <img src="res/campus_life_logo.png" alt="Logo 2" style="max-width: 90%; max-height: 90%;">
                    </div>
                    <div class="text">Campus Life</div>
                </div>
                <div class="block" id="service" data-content="What is the email or contact information for the school’s IT department?">
                    <div class="logo">
                        <img src="res/service_logo.png" alt="Logo 3" style="max-width: 90%; max-height: 90%;">
                    </div>
                    <div class="text">Service</div>
                </div>
                <div class="block" id="tools" data-content="What preparations do I need to make if I want to organize a club at DKU?">
                    <div class="logo">
                        <img src="res/tools_logo.png" alt="Logo 4" style="max-width: 90%; max-height: 90%;">
                    </div>
                    <div class="text">Tools</div>
                </div>
            </div>
        </div>
        <div id="input-container">
            <input type="text" id="message-input" placeholder="Type a message..." />
            <button id="send-button">⬆</button>
        </div>
        <div id="declaration">
            Developed by DKU Edge Intelligence Lab.
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
